version: "3.8"

services:
  mysql:
    image: mysql:8.0
    platform: linux/arm64/v8
    container_name: travel_diary_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: travel_diary
      MYSQL_USER: travel
      MYSQL_PASSWORD: travel123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build: ./backend
    container_name: travel_diary_backend
    restart: unless-stopped
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      DATABASE_URL: mysql+pymysql://travel:travel123456@mysql:3306/travel_diary
      JWT_SECRET_KEY: travel-diary-secret-key-2026-change-me-in-production
      UPLOAD_FOLDER: /app/uploads
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: travel_diary_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_BASE_URL: ""
      NEXT_PUBLIC_IMAGE_API_URL: http://localhost:5001
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
